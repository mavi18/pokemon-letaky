name: Kimbino Pokemon Bot

on:
  schedule:
    - cron: '0 6,16 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Inštalácia závislostí
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Spustenie Scrapera
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scraper.py

      - name: Uloženie zmien (state.json)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update state.json" && git push)
