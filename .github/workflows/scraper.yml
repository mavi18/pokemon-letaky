name: Kimbino Pokemon Bot

on:
  schedule:
    # GitHub beží v UTC čase. 
    # Letný čas v BA (CEST) je UTC+2, takže 8:00 = 6:00 a 18:00 = 16:00
    - cron: '0 6,16 * * *'
  workflow_dispatch: # Toto tlačidlo ti umožní spustiť bota manuálne z GitHubu kedykoľvek

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dôležité: povoľuje botovi zapisovať do repozitára

    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Inštalácia závislostí
        run: pip install -r requirements.txt

      - name: Spustenie Scrapera
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scraper.py

      - name: Uloženie zmien (state.json)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json
          # Commitne sa len vtedy, ak sa súbor zmenil (niečo pribudlo/zmizlo)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update state.json" && git push)

